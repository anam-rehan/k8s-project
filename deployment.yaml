apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-project
  template:
    metadata:
      labels:
        app: k8s-project
    spec:
      containers:
      - name: k8s-project
        image: 984459227756.dkr.ecr.ap-southeast-1.amazonaws.com/k8s-project:latest
        ports:
        - containerPort: 3000
