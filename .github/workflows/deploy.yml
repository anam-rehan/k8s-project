name: Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-southeast-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password | docker login \
        --username AWS \
        --password-stdin 984459227756.dkr.ecr.ap-southeast-1.amazonaws.com

    - name: Build & Push Image
      run: |
        docker build -t k8s-project .
        docker tag k8s-project:latest 984459227756.dkr.ecr.ap-southeast-1.amazonaws.com/k8s-project:latest
        docker push 984459227756.dkr.ecr.ap-southeast-1.amazonaws.com/k8s-project:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ap-southeast-1 --name my-eks-cluster

    - name: Deploy to EKS
      run: |
        kubectl apply -f deployment.yaml
